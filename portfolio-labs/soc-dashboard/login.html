<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — SOC Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-soc">

  <div class="auth-page">
    <div class="auth-card panel">
      <div class="topbar-mark" style="margin-bottom:24px;">◆ SOC-CONSOLE</div>
      <div class="auth-title">Log in</div>
      <div class="auth-subtitle">One account works across SOC, ITSM, CRM, and Directory.</div>

      <div class="form-row" style="margin-top:24px;">
        <label class="form-label">Email</label>
        <input class="form-input" id="li-email" type="email" placeholder="you@company.com" autocomplete="username" />
      </div>
      <div class="form-row">
        <label class="form-label">Password</label>
        <input class="form-input" id="li-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div id="login-error"></div>

      <button class="copilot-trigger" id="li-submit-btn" style="width:100%; justify-content:center; margin-top:8px;">Log in</button>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up →</a>
      </div>
    </div>
  </div>

  <script src="../shared/auth-client.js"></script>
  <script>
    if (getSessionToken()) {
      window.location.href = "index.html";
    }
    async function doLogin() {
      const email = document.getElementById("li-email").value.trim();
      const password = document.getElementById("li-password").value;
      const errorEl = document.getElementById("login-error");
      const btn = document.getElementById("li-submit-btn");
      errorEl.innerHTML = "";
      if (!email || !password) {
        errorEl.innerHTML = '<div class="copilot-error">Enter both email and password.</div>';
        return;
      }
      btn.disabled = true;
      btn.textContent = "Logging in...";
      const res = await authApi("/auth/login", { method: "POST", body: { email, password } });
      btn.disabled = false;
      btn.textContent = "Log in";
      if (!res.ok) {
        errorEl.innerHTML = `<div class="copilot-error">${res.message || "Login failed."}</div>`;
        return;
      }
      setSessionToken(res.token);
      setStoredUser(res.user);
      window.location.href = "index.html";
    }
    document.getElementById("li-submit-btn").onclick = doLogin;
    document.getElementById("li-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
