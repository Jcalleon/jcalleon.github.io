name = "portfolio-ai-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Rate-limit storage for the AI proxy (already set up)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "d06360e0bf274d9f95fec2c4eaabae31"

# Real ITSM ticket + auth database (already set up)
[[d1_databases]]
binding = "DB"
database_name = "itsm-db"
database_id = "7bd43df4-7022-4053-8fcb-ae9ae4256e65"

# Email notifications — sends only to your verified address, free.
# Requires Email Routing enabled + jcalleon@outlook.com (or your real address)
# verified as a destination address first (see DEPLOY_AUTH.md).
[[send_email]]
name = "NOTIFY_EMAIL"
