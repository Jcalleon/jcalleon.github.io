<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/tokens.css" />
  <link rel="stylesheet" href="resume-builder.css" />
  <script src="shared/auth-client.js"></script>
  <script>
    if (!getSessionToken()) {
      window.location.replace("login.html");
    }
  </script>
</head>
<body class="app-resumebuilder">

  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-mark">◆ RESUME BUILDER</span>
        <span class="topbar-app-name">Private — job-tailored resume generator</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="topbar-user"></span>
        <span class="topbar-link">⛁ <a href="launcher.html">Launcher</a></span>
      </div>
    </header>

    <main class="rb-main">
      <div class="rb-input-panel panel">
        <div class="rb-input-header">
          <h2>Job description</h2>
          <p class="demo-note">Paste the full posting. The more specific, the better the keyword match.</p>
        </div>
        <textarea id="jd-input" class="form-textarea rb-jd-textarea" placeholder="Paste the job description here..."></textarea>
        <div id="rb-error"></div>
        <button class="copilot-trigger" id="generate-btn" style="margin-top:12px;">✦ Generate tailored resume</button>
      </div>

      <div class="rb-output-panel panel" id="rb-output-panel" style="display:none;">
        <div class="rb-output-header">
          <h2>Draft resume</h2>
          <div class="rb-output-actions">
            <button class="btn-secondary" id="regenerate-btn">Regenerate</button>
            <button class="copilot-trigger" id="download-btn">Download .docx</button>
          </div>
        </div>
        <div class="demo-note" style="margin-bottom:12px;">Editable — click into any field below and adjust before downloading. Nothing is saved until you download.</div>
        <div id="resume-editor"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/docx@9.7.1/dist/index.iife.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="shared/ai-client.js"></script>
  <script src="cv-content-data.js"></script>
  <script src="resume-builder.js"></script>
</body>
</html>
