<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background-image: none; }
    .auth-wrap { max-width: 420px; margin: 0 auto; padding: 64px 24px; }
    .auth-eyebrow {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
    }
    .auth-title { font-size: 24px; font-weight: 700; margin: 0 0 8px; }
    .auth-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
    .auth-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
    .auth-switch { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body class="app-itsm">
  <div class="auth-wrap">
    <div class="auth-eyebrow">◆ HELPDESK</div>
    <h1 class="auth-title">Agent login</h1>
    <p class="auth-sub">Log in to access the ticket queue and dashboard.</p>

    <div class="auth-panel">
      <div class="form-row">
        <label class="form-label">Email</label>
        <input class="form-input" id="li-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-row">
        <label class="form-label">Password</label>
        <input class="form-input" id="li-password" type="password" placeholder="••••••••" />
      </div>
      <div id="login-error" style="margin-bottom:16px;"></div>
      <button class="copilot-trigger" id="li-submit-btn" style="width:100%; justify-content:center;">Log in</button>
    </div>

    <a class="auth-switch" href="signup.html">Need an account? Sign up →</a>
  </div>

  <script src="../shared/ticket-client.js"></script>
  <script>
    // If already logged in, skip straight to the queue.
    if (getSessionToken()) {
      window.location.href = "index.html";
    }

    async function doLogin() {
      const email = document.getElementById("li-email").value.trim();
      const password = document.getElementById("li-password").value;
      const errorEl = document.getElementById("login-error");
      const btn = document.getElementById("li-submit-btn");
      errorEl.innerHTML = "";

      if (!email || !password) {
        errorEl.innerHTML = '<div class="copilot-error">Enter both email and password.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = "Logging in...";
      const res = await ticketApi("/auth/login", { method: "POST", body: { email, password } });
      btn.disabled = false;
      btn.textContent = "Log in";

      if (!res.ok) {
        errorEl.innerHTML = `<div class="copilot-error">${res.message || "Login failed."}</div>`;
        return;
      }

      setSessionToken(res.token);
      setStoredUser(res.user);
      window.location.href = "index.html";
    }

    document.getElementById("li-submit-btn").onclick = doLogin;
    document.getElementById("li-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
