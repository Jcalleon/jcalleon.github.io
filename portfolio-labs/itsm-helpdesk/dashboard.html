<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .stat-value { font-family: var(--font-mono); font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .breakdown-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .breakdown-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 14px; }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px; }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-bar-bg { flex: 1; height: 6px; background: var(--panel-raised); border-radius: 3px; margin: 0 12px; overflow: hidden; }
    .breakdown-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
    .feedback-item { background: var(--panel-raised); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; font-size: 13px; }
    .feedback-stars { color: var(--status-medium); margin-bottom: 4px; }
    .lock-wrap { max-width: 360px; margin: 80px auto; text-align: center; }
  </style>
</head>
<body class="app-itsm">
  <div class="app-shell" style="grid-template-columns: 1fr;">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-mark">◆ HELPDESK</span>
        <span class="topbar-app-name">Dashboard</span>
      </div>
      <div class="topbar-right">
        <a href="index.html" class="topbar-link">← Ticket queue</a>
        <span class="topbar-link">⤺ <a href="https://jcalleon.github.io/#lab">Back to portfolio</a></span>
      </div>
    </header>

    <main class="main" id="main-content">
      <div class="lock-wrap" id="lock-screen">
        <p style="color:var(--text-secondary); margin-bottom:16px;">Agent password required.</p>
        <input class="form-input" id="dash-password" type="password" placeholder="Password" style="margin-bottom:12px;" />
        <button class="copilot-trigger" id="dash-unlock-btn" style="width:100%; justify-content:center;">Unlock</button>
        <div id="dash-lock-error" style="margin-top:12px;"></div>
      </div>

      <div id="dashboard-content" style="display:none;"></div>
    </main>
  </div>

  <script src="../shared/ticket-client.js"></script>
  <script>
    async function tryLoadDashboard() {
      const res = await ticketApi("/stats", { asAgent: true });
      if (!res.ok) return false;
      renderDashboard(res);
      return true;
    }

    function renderDashboard(stats) {
      document.getElementById("lock-screen").style.display = "none";
      const content = document.getElementById("dashboard-content");
      content.style.display = "block";

      const statusMap = {};
      stats.byStatus.forEach(s => statusMap[s.status] = s.count);
      const total = Object.values(statusMap).reduce((a, b) => a + b, 0);

      const priorityMap = {};
      stats.byPriority.forEach(p => priorityMap[p.priority] = p.count);

      const maxCategoryCount = Math.max(1, ...stats.byCategory.map(c => c.count));
      const maxPriorityCount = Math.max(1, ...stats.byPriority.map(p => p.count));

      content.innerHTML = `
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-value">${total}</div>
            <div class="stat-label">Total tickets</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--status-high);">${statusMap.new || 0}</div>
            <div class="stat-label">New / unactioned</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--status-critical);">${stats.slaBreaches}</div>
            <div class="stat-label">SLA breached</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--status-success);">${statusMap.resolved || 0}</div>
            <div class="stat-label">Resolved</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.avgRating ? stats.avgRating.toFixed(1) : "—"} <span style="font-size:16px;">★</span></div>
            <div class="stat-label">Avg rating (${stats.ratingCount} reviews)</div>
          </div>
        </div>

        <div class="breakdown-grid">
          <div class="breakdown-panel">
            <div class="breakdown-title">By priority</div>
            ${["high","medium","low"].map(p => `
              <div class="breakdown-row">
                <span style="width:60px;">${p}</span>
                <div class="breakdown-bar-bg"><div class="breakdown-bar-fill" style="width:${((priorityMap[p]||0)/maxPriorityCount*100)}%"></div></div>
                <span class="mono">${priorityMap[p] || 0}</span>
              </div>
            `).join("")}
          </div>
          <div class="breakdown-panel">
            <div class="breakdown-title">By category</div>
            ${stats.byCategory.map(c => `
              <div class="breakdown-row">
                <span style="width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.category}</span>
                <div class="breakdown-bar-bg"><div class="breakdown-bar-fill" style="width:${(c.count/maxCategoryCount*100)}%"></div></div>
                <span class="mono">${c.count}</span>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="breakdown-panel">
          <div class="breakdown-title">Recent feedback</div>
          ${stats.recentRatings.length === 0 ? '<div class="empty-state" style="padding:20px;">No feedback yet.</div>' :
            stats.recentRatings.map(r => `
              <div class="feedback-item">
                <div class="feedback-stars">${"★".repeat(r.stars)}${"☆".repeat(5 - r.stars)}</div>
                <div style="color:var(--text-secondary); margin-bottom:4px;">${r.subject}</div>
                ${r.comment ? `<div>"${r.comment}"</div>` : ""}
              </div>
            `).join("")
          }
        </div>
      `;
    }

    document.getElementById("dash-unlock-btn").onclick = async () => {
      const pw = document.getElementById("dash-password").value;
      setStoredAgentPassword(pw);
      const ok = await tryLoadDashboard();
      if (!ok) {
        document.getElementById("dash-lock-error").innerHTML = '<div class="copilot-error">Incorrect password.</div>';
        clearStoredAgentPassword();
      }
    };

    // Auto-try if password already in session from the main dashboard
    tryLoadDashboard();
  </script>
</body>
</html>
